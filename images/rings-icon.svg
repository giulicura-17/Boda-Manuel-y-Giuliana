<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100" role="img" aria-labelledby="title">
  <title id="title">Alianzas de casamiento entrelazadas</title>
  <g fill="none" stroke="#a28c67" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Dos alianzas completas, levemente inclinadas -->
    <ellipse cx="61" cy="52" rx="31" ry="38" transform="rotate(-18 61 52)"/>
    <ellipse cx="99" cy="52" rx="31" ry="38" transform="rotate(18 99 52)"/>
  </g>
  <!-- Cruce superior: la alianza izquierda pasa por delante -->
  <path d="M72 25 C82 31 87 40 88 50" fill="none" stroke="#f7f3eb" stroke-width="10" stroke-linecap="round"/>
  <path d="M72 25 C82 31 87 40 88 50" fill="none" stroke="#a28c67" stroke-width="4" stroke-linecap="round"/>
  <!-- Cruce inferior: la alianza derecha pasa por delante -->
  <path d="M88 75 C78 69 73 60 72 50" fill="none" stroke="#f7f3eb" stroke-width="10" stroke-linecap="round"/>
  <path d="M88 75 C78 69 73 60 72 50" fill="none" stroke="#a28c67" stroke-width="4" stroke-linecap="round"/>
</svg>
